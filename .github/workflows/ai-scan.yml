name: AI Component Scan

on:
  workflow_dispatch:
    inputs:
      repo_url:
        description: "GitHub/GitLab repo URL to scan (leave blank to scan THIS repo)"
        required: false
        default: ""

  push:
    branches: [main]

  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  scan:
    name: Scan for AI Components
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Checkout claudescan scanner
        uses: actions/checkout@v4
        with:
          repository: rlfagan/aiscan
          path: aiscan

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Determine scan target
        id: target
        run: |
          INPUT="${{ github.event.inputs.repo_url }}"
          THIS_REPO="https://github.com/${{ github.repository }}"
          if [ -z "$INPUT" ] || [ "$INPUT" = "$THIS_REPO" ]; then
            echo "url=$THIS_REPO" >> $GITHUB_OUTPUT
            echo "local=true" >> $GITHUB_OUTPUT
          else
            echo "url=$INPUT" >> $GITHUB_OUTPUT
            echo "local=false" >> $GITHUB_OUTPUT
          fi

      - name: Run AI component scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        working-directory: aiscan
        run: |
          if [ "${{ steps.target.outputs.local }}" = "true" ]; then
            python scan.py --local "$GITHUB_WORKSPACE" "${{ steps.target.outputs.url }}"
          else
            python scan.py "${{ steps.target.outputs.url }}"
          fi

      - name: Commit reports to repo
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add aiscan/reports/
          git diff --staged --quiet || git commit -m "chore: add scan reports [skip ci]"
          git push

      - name: Upload HTML report artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-scan-report-html
          path: aiscan/reports/*.html
          retention-days: 30

      - name: Upload AI-BOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-bom-cyclonedx
          path: aiscan/reports/*_bom.json
          retention-days: 30

      - name: Upload topology diagram artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-topology-diagram
          path: aiscan/reports/*_topology.html
          retention-days: 30
          if-no-files-found: warn

      - name: Post summary to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const reportsDir = 'aiscan/reports';
            const files = fs.readdirSync(reportsDir).filter(f => f.endsWith('.md'));
            if (!files.length) { console.log('No report found'); return; }
            const report = fs.readFileSync(path.join(reportsDir, files[0]), 'utf8');
            const body = `## 🔍 AI Component Scan Results\n\n${report.slice(0, 65000)}`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
