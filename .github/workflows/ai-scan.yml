name: AI Component Scan

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  scan:
    name: Scan for AI Components
    runs-on: ubuntu-latest

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Download claudescan
        run: |
          curl -sSL https://raw.githubusercontent.com/rlfagan/aiscan/main/scan.py -o scan.py
          curl -sSL https://raw.githubusercontent.com/rlfagan/aiscan/main/topology.py -o topology.py
          curl -sSL https://raw.githubusercontent.com/rlfagan/aiscan/main/aibom.py -o aibom.py

      - name: Run AI component scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scan.py

      - name: Commit reports to repo
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          git diff --staged --quiet || git commit -m "chore: add AI scan reports [skip ci]"
          git push

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: ai-scan-report-html
          path: reports/*.html
          retention-days: 30

      - name: Upload AI-BOM
        uses: actions/upload-artifact@v4
        with:
          name: ai-bom-cyclonedx
          path: reports/*_bom.json
          retention-days: 30

      - name: Upload topology diagram
        uses: actions/upload-artifact@v4
        with:
          name: ai-topology-diagram
          path: reports/*_topology.html
          retention-days: 30
          if-no-files-found: warn

      - name: Post summary to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const files = fs.readdirSync('reports').filter(f => f.endsWith('.md'));
            if (!files.length) { console.log('No report found'); return; }
            const report = fs.readFileSync(path.join('reports', files[0]), 'utf8');
            const body = `## AI Component Scan Results\n\n${report.slice(0, 65000)}`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
